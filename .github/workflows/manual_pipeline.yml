name: OOB Polars Testing 2026

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Polars explicitly
        run: |
          pip install polars

      - name: Run module unit tests (if available)
        run: |
          # Polars does not expose a simple suite to run; placeholder step
          echo "skipping library unit tests"

      - name: Run Functional Tests
        run: |
          pytest tests/functional --verbose

      - name: Run Performance Tests
        run: |
          pytest tests/performance --verbose --log-cli-level=INFO
